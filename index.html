
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Vyapara Mithra - Your Business Friend</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary-green: #059669;
        --accent-orange: #f97316; /* Brighter, trust-building Orange */
        --accent-amber: #fbbf24;
      }
      body {
        font-family: 'Outfit', 'Hind', sans-serif;
        background: #0f172a; 
        color: #1e293b;
        margin: 0;
        overflow-x: hidden;
        overflow-y: auto;
      }
      .app-bg-image {
        position: fixed;
        inset: 0;
        z-index: -1;
        background-size: cover;
        background-position: center;
        transition: background-image 1.2s ease-in-out, filter 1s ease-in-out;
      }
      .bg-overlay {
        position: fixed;
        inset: 0;
        z-index: 0;
        background: linear-gradient(180deg, rgba(15, 23, 42, 0.3) 0%, rgba(15, 23, 42, 0.75) 100%);
        backdrop-filter: blur(2px);
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.3);
      }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      @keyframes soft-pulse {
        0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.5); }
        70% { transform: scale(1.08); box-shadow: 0 0 0 20px rgba(249, 115, 22, 0); }
        100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); }
      }
      .mic-active {
        animation: soft-pulse 1.5s infinite ease-in-out;
      }

      @keyframes btn-pulse {
        0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.4); }
        70% { box-shadow: 0 0 0 15px rgba(249, 115, 22, 0); }
        100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); }
      }
      .pulse-button:not(:disabled) {
        animation: btn-pulse 2.5s infinite;
      }

      .slide-up {
        animation: slideUp 0.7s cubic-bezier(0.22, 1, 0.36, 1);
      }
      @keyframes slideUp {
        from { transform: translateY(40px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }

      [contenteditable="true"]:focus {
        outline: none;
        background: rgba(5, 150, 105, 0.04);
        border-radius: 12px;
        box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.2);
      }

      .btn-accent {
        background: linear-gradient(135deg, var(--accent-orange), var(--accent-amber));
        color: white;
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react/": "https://esm.sh/react@^19.2.3/",
        "react": "https://esm.sh/react@^19.2.3",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "@google/genai": "https://esm.sh/@google/genai@^1.33.0",
        "lucide-react": "https://esm.sh/lucide-react@^0.561.0"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
